name: Build Android APK

on:
  push:
    branches: [ main, master, production ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Web App
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Generate Debug Keystore (if not exists)
        run: |
          mkdir -p $HOME/.android
          if [ ! -f "$HOME/.android/debug.keystore" ]; then
            keytool -genkeypair \
              -keystore $HOME/.android/debug.keystore \
              -alias androiddebugkey \
              -keypass android \
              -storepass android \
              -dname "CN=Android Debug,O=Android,C=US" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000
            echo "✅ Debug keystore criado"
          else
            echo "✅ Debug keystore já existe"
          fi

      - name: Debug Info
        run: |
          java -version
          javac -version
          echo "JAVA_HOME: $JAVA_HOME"
          ls -la $HOME/.android/

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug --stacktrace --no-daemon -Dorg.gradle.jvmargs="-Xmx2g -XX:MaxMetaspaceSize=512m"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: comissionamento-vc-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
